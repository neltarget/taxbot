services:
  - type: web
    name: taxbot
    runtime: python
    plan: free
    buildCommand: >
      pip install uv &&
      uv sync --no-dev &&
      cd taxbot-frontend &&
      echo "VITE_API_URL=" > .env &&
      npm install &&
      npm run build
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: VITE_API_URL
        value: ""
      - key: PYTHON_VERSION
        value: 3.12.0
