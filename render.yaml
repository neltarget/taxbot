services:
  - type: web
    name: taxbot
    runtime: python
    plan: free
    buildCommand: >
      pip install openai python-dotenv fastapi uvicorn python-multipart &&
      cd taxbot-frontend &&
      npm install &&
      npm run build
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-v4-flash:free
      - key: PYTHON_VERSION
        value: 3.12.0
