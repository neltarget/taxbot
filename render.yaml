services:
  - type: web
    name: taxbot
    runtime: python
    plan: free
    buildCommand: >
      pip install uv &&
      uv sync --no-dev &&
      cd taxbot-frontend &&
      npm install &&
      npm run build
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: PYTHON_VERSION
        value: 3.12.0
